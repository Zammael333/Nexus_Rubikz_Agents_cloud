steps:
  - id: test
    name: ghcr.io/astral-sh/uv:python3.11-bookworm-slim
    entrypoint: bash
    args:
      - -c
      - |
        uv sync --frozen --group dev
        uv run python -m pytest tests/unit/ -v --tb=short
        uv run python -m pytest tests/integration/ -v --tb=short

  - id: sanitize-static
    name: ghcr.io/astral-sh/uv:python3.11-bookworm-slim
    entrypoint: bash
    args:
      - -c
      - |
        uv sync --frozen --group dev
        uv run ruff check app/ tests/ scripts/ --no-cache
    waitFor:
      - test

  - id: docker-build
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - $_ARTIFACT_REGISTRY_REPO/$_SERVICE_NAME:$SHORT_SHA
      - -t
      - $_ARTIFACT_REGISTRY_REPO/$_SERVICE_NAME:latest
      - --cache-from
      - $_ARTIFACT_REGISTRY_REPO/$_SERVICE_NAME:latest
      - -f
      - Dockerfile.twin
      - .
    waitFor:
      - sanitize-static

  - id: docker-push
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - $_ARTIFACT_REGISTRY_REPO/$_SERVICE_NAME:$SHORT_SHA
    waitFor:
      - docker-build

  - id: deploy-gke
    name: gcr.io/google.com/cloudsdktool/google-cloud-cli
    entrypoint: bash
    args:
      - -c
      - |
        gcloud container clusters get-credentials $_GKE_CLUSTER --region $_GKE_REGION
        sed -i "s|__IMAGE_TAG__|$SHORT_SHA|g" deployment-twin.yaml
        kubectl apply -f deployment-twin.yaml
    waitFor:
      - docker-push

substitutions:
  _ARTIFACT_REGISTRY_REPO: us-east1-docker.pkg.dev/${PROJECT_ID}/nexus-rubykz
  _SERVICE_NAME: nexus-rubykz-twin
  _GKE_CLUSTER: nexus-rubykz
  _GKE_REGION: us-east1

options:
  machineType: E2_HIGHCPU_8
  logging: CLOUD_LOGGING_ONLY

timeout: 1800s
