apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexus-rubykz-twin
  labels:
    app: nexus-rubykz
    component: twin
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: nexus-rubykz
      component: twin
  template:
    metadata:
      labels:
        app: nexus-rubykz
        component: twin
      annotations:
        sidecar.opentelemetry.io/inject: "true"
        cluster-autoscaler.kubernetes.io/safe-to-evict: "true"
    spec:
      serviceAccountName: nexus-rubykz-twin-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1002
        fsGroup: 1002
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: twin
          image: us-east1-docker.pkg.dev/${PROJECT_ID}/nexus-rubykz/nexus-rubykz-twin:__IMAGE_TAG__
          imagePullPolicy: Always
          ports:
            - containerPort: 8001
              name: http
            - containerPort: 50051
              name: a2a-grpc
          envFrom:
            - configMapRef:
                name: nexus-rubykz-config
            - secretRef:
                name: nexus-rubykz-secrets
          env:
            - name: APP_ENV
              value: "production"
            - name: CONTAINER_ROLE
              value: "twin"
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 2
---
apiVersion: v1
kind: Service
metadata:
  name: nexus-rubykz-twin-svc
  labels:
    app: nexus-rubykz
    component: twin
spec:
  type: ClusterIP
  selector:
    app: nexus-rubykz
    component: twin
  ports:
    - name: http
      port: 8001
      targetPort: 8001
    - name: a2a-grpc
      port: 50051
      targetPort: 50051
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: nexus-rubykz-twin-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: nexus-rubykz-twin
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: nexus-rubykz-twin-pdb
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: nexus-rubykz
      component: twin
